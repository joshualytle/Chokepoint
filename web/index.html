<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chokepoint</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="boot"><div class="spinner"></div>Loading Python runtime…<div id="boot-sub"></div></div>

  <header>
    <h1>CHOKEPOINT</h1>
    <span class="tag">typed-alert tower-defense · write Python to hold the line</span>
  </header>

  <main>
    <section class="board-col">
      <div class="board-stack">
        <canvas id="board" width="820" height="620"></canvas>
        <div id="waveMsg" class="wavemsg"></div>
        <div id="placeMsg" class="placemsg"></div>
        <div id="boardTip" class="board-tip hidden"></div>
        <div id="boardOverlay" class="board-overlay hidden"></div>
        <div id="tutorial" class="tutorial hidden"></div>
      </div>
      <div class="controls">
        <div class="ctl-group">
          <button id="startBtn" class="primary big">▶ Start</button>
          <button id="stepBtn" title="Advance one tick (while paused)">⏭ Step</button>
          <span class="seg" role="group" aria-label="simulation speed">
            <button class="spd" data-spd="1">1×</button>
            <button class="spd" data-spd="2">2×</button>
            <button class="spd" data-spd="3">3×</button>
          </span>
        </div>
        <div class="ctl-group">
          <button id="undoBtn" title="Undo the last placement or build edit (Ctrl+Z)">↶ Undo</button>
          <button id="buildBtn" title="Edit the topology: add nodes and edges">🔧 Build</button>
          <button id="learnBtn" title="Guided walkthroughs: spill, gates, parsers, modules">🎓 Learn</button>
          <button id="metricsBtn" title="Run telemetry: per-kind and per-node stats">📊 Metrics</button>
          <button id="helpBtn" title="Glossary of concepts">❔ Help</button>
          <button id="resetBtn" title="Reset the run">Reset</button>
        </div>
        <div class="ctl-group">
          <label>map
            <select id="mapSel"></select>
          </label>
          <label>difficulty
            <select id="diffSel"></select>
          </label>
          <label class="autopause" title="Pause the moment an alert leaks, so you can read the coach and fix it"><input type="checkbox" id="autoPause"> auto-pause on leak</label>
        </div>
      </div>
      <div id="palette" class="palette"></div>
    </section>

    <section class="side-col">
      <div id="lessons" class="lessons"></div>
      <div id="hud" class="hud"></div>

      <div class="editor-wrap">
        <div class="editor-head">
          <span class="editor-title"><i class="dot"></i>loadout.py <em>— your build in Python</em></span>
          <button id="runBtn" class="primary">▶ Run <kbd>Ctrl+↵</kbd></button>
        </div>
        <textarea id="code" spellcheck="false"></textarea>
        <div id="codeStatus" class="code-status"></div>
        <div class="save-bar">
          <button id="copyBtn" title="Copy a shareable save-code (build + map + difficulty) to your clipboard">⤓ Copy save-code</button>
          <button id="loadBtn" title="Paste a save-code to load it (you review the code, then Run)">⤒ Load save-code</button>
          <span class="save-note">auto-saved to this browser</span>
        </div>
      </div>
    </section>
  </main>

  <div id="glossary" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><span>Glossary</span><button id="glossClose">✕</button></div>
      <div id="glossBody"></div>
    </div>
  </div>

  <div id="metrics" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><span>Metrics — run telemetry</span><button id="metricsClose">✕</button></div>
      <div id="metricsBody"></div>
    </div>
  </div>

  <div id="walkthroughs" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><span>Walkthroughs — guided, hands-on</span><button id="wtClose">✕</button></div>
      <div id="wtBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
