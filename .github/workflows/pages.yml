name: Deploy web-native app to GitHub Pages

# Builds the Pyodide bundle (web/chokepoint.zip) from the Python core and
# publishes the static web/ folder to GitHub Pages on every push to main.
# One-time setup: Settings -> Pages -> Build and deployment -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths: ["web/**", "src/chokepoint/**", "serve_native.py", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Package the Python core for Pyodide
        run: python -c "import serve_native; serve_native.build_package()"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
